name: Staging Deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging
  cancel-in-progress: false

jobs:
  build-static:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Build website
        run: bun run build:website
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_DASHBOARD_URL: ${{ secrets.STAGING_DASHBOARD_URL }}

      - name: Build dashboard
        run: bun run build:dashboard
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: apps/website/out
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
          retention-days: 1

  deploy-website:
    needs: build-static
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website-dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website-dist --project-name=atomic-seat-website

  deploy-dashboard:
    needs: build-static
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard-dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard-dist --project-name=atomic-seat-dashboard

  deploy-server:
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Render deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Render deploy hook returned HTTP $STATUS"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
